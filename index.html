<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Digest — Morrison Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="brand">
        <span class="logo">🌼</span>
        <div>
          <h1>Research Digest</h1>
          <p class="subtitle">Curated literature for the Morrison Lab</p>
        </div>
      </div>
      <div class="header-right">
        <div class="meta" id="meta">Loading…</div>
        <button class="admin-login-btn" id="admin-login-btn" title="Admin login">🔒</button>
      </div>
    </div>
    <div class="filters-wrap">
      <button class="filters-toggle" id="filters-toggle" aria-expanded="false">
        Filters <span class="toggle-arrow">▾</span>
      </button>
      <div class="filters" id="filters"></div>
    </div>
  </header>

  <main>
    <div id="papers" class="papers-grid"></div>
    <div id="empty" class="empty hidden">No papers match the selected filter.</div>
  </main>

  <footer>
    <p>Generated by <strong>Daisy</strong> 🌼 · Updated automatically</p>
  </footer>

  <!-- Login Modal -->
  <div id="login-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Admin Login</h3>
      <form id="login-form">
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" />
        <div class="modal-actions">
          <button type="button" class="bar-btn secondary" id="login-cancel">Cancel</button>
          <button type="submit" class="bar-btn primary">Login</button>
        </div>
        <p id="login-error" class="login-error hidden">Invalid password</p>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
